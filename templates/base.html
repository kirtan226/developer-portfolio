<!DOCTYPE html>
{% load static %}
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Portfolio website showcasing design engineering work.">
    <title>{% block title %}Portfolio{% endblock %}</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{% static 'css/core.css' %}" rel="stylesheet">
</head>
<body>
    <div class="page-dots" aria-hidden="true"></div>
    <header class="site-header">
        <div class="header-side d-none d-md-flex"></div>
        <nav class="nav-cluster" aria-label="Main navigation">
            <a class="nav-link active" href="#home"><i class="bi bi-house-door"></i><span>Home</span></a>
            <a class="nav-link" href="#about"><i class="bi bi-person"></i><span>About</span></a>
            <a class="nav-link" href="#skills"><i class="bi bi-stars"></i><span>Skills</span></a>
            <a class="nav-link" href="#projects"><i class="bi bi-grid"></i><span>Projects</span></a>
            <a class="nav-link" href="#experience"><i class="bi bi-briefcase"></i><span>Experience</span></a>
            <a class="nav-link" href="#contact"><i class="bi bi-envelope"></i><span>Contact</span></a>
            <span class="nav-divider"></span>
            <button class="theme-toggle" type="button" aria-label="Toggle theme">
                <i class="bi bi-moon-stars"></i>
            </button>
        </nav>
        <div class="header-side header-time d-none d-md-flex" data-timezone="Asia/Kolkata"></div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p><span>&copy; {{ current_year }} /</span> {{ person.name }} <span>/ Build your portfolio with Once UI</span></p>
        {% if social_links %}
        <div class="footer-social">
            {% for item in social_links %}
            <a href="{{ item.link }}" target="_blank" rel="noopener" aria-label="{{ item.name }}">
                <i class="bi {{ item.icon }}"></i>
            </a>
            {% endfor %}
        </div>
        {% endif %}
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/core.js' %}"></script>
</body>
</html>
